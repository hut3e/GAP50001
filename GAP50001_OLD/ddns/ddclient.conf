## Cấu hình mẫu cho ddclient (Dynamic DNS).
## Hãy sửa lại các giá trị bên dưới cho đúng tài khoản và hostname DDNS của bạn,
## ví dụ dùng No-IP, Dynu, DuckDNS,...
##
## Sau khi sửa xong, chỉ cần: docker compose up -d
## ddclient sẽ tự cập nhật IP động của máy Ubuntu lên hostname.

daemon=300                     # 5 phút cập nhật 1 lần
syslog=yes
ssl=yes

## Lấy IP public từ dịch vụ web
use=web, web=checkip.dyndns.org/, web-skip='Current IP Address:'

## Ví dụ cấu hình cho No-IP:
## Tham khảo thêm tại: https://www.noip.com/support/knowledgebase/installing-the-linux-dynamic-update-client/
protocol=noip
server=dynupdate.no-ip.com
login=YOUR_NOIP_USERNAME
password=YOUR_NOIP_PASSWORD
YOUR_HOSTNAME_DDNS

## Nếu dùng dịch vụ khác (Dynu, DuckDNS, v.v.) hãy đọc tài liệu dịch vụ đó
## và chỉnh lại các dòng protocol/server/login/password/hostname tương ứng.

