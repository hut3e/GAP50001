# ============================================================
#  Nginx config — ISO 50001 GAP Survey
#  HTTP only (no SSL) — use reverse proxy or VPN for security
#  Listens on port 80 inside container (mapped to 8888 on host)
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Let's Encrypt HTTP-01 challenge (run certbot first) ──
    # Uncomment after: certbot certonly --webroot -w ./certbot/www -d your.domain.com
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    # ── Frontend SPA (React) ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── API proxy ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:5002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout  60s;
        client_max_body_size 20M;
    }

    # ── Health check (no /api prefix) ───────────────────────
    location /health {
        proxy_pass http://backend:5002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Uploads (served from backend disk) ──────────────────
    location /uploads/ {
        proxy_pass http://backend:5002/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
