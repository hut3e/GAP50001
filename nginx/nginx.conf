map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Ẩn version Nginx
    server_tokens off;

    # Nơi Let's Encrypt kiểm tra HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Chặn truy cập file nhạy cảm ──────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* \.(env|git|gitignore|dockerignore|md|yml|yaml|lock|log|bak|swp|sql)$ {
        deny all;
        return 404;
    }
    location ~* (Dockerfile|docker-compose|Makefile|package\.json|package-lock\.json) {
        deny all;
        return 404;
    }

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://iso50001-backend:5002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 25M;

        # Chặn truy cập trực tiếp file nhạy cảm qua API
        location ~* /api/(\.env|\.git) {
            deny all;
            return 404;
        }
    }

    # Uploads proxy — chỉ cho phép file media/document
    location /uploads/ {
        proxy_pass http://iso50001-backend:5002/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Chặn directory listing
        autoindex off;

        # Chỉ cho phép file có đuôi an toàn
        location ~* \.(jpg|jpeg|png|gif|webp|pdf|doc|docx|xls|xlsx)$ {
            proxy_pass http://iso50001-backend:5002;
        }
        # Tất cả file khác bị chặn
        location ~* \..+$ {
            deny all;
            return 403;
        }
    }

    # Socket.IO proxy to backend
    location /socket.io/ {
        proxy_pass http://iso50001-backend:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health
    location /health {
        proxy_pass http://iso50001-backend:5002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
